version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: code-ide-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: code_ide
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - code-ide-network

  redis:
    image: redis:7-alpine
    container_name: code-ide-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --requirepass redis_password
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - code-ide-network

  minio:
    image: minio/minio:latest
    container_name: code-ide-minio
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - code-ide-network

  minio-setup:
    image: minio/mc:latest
    container_name: code-ide-minio-setup
    depends_on:
      - minio
    networks:
      - code-ide-network
    entrypoint: >
      /bin/sh -c "
      sleep 10;
      /usr/bin/mc alias set myminio http://minio:9000 minioadmin minioadmin123;
      /usr/bin/mc mb myminio/user-files --ignore-existing;
      /usr/bin/mc mb myminio/project-files --ignore-existing;
      /usr/bin/mc mb myminio/execution-outputs --ignore-existing;
      /usr/bin/mc anonymous set download myminio/user-files;
      /usr/bin/mc anonymous set download myminio/project-files;
      echo 'MinIO buckets created successfully';
      exit 0;
      "

volumes:
  postgres_data:
  redis_data:
  minio_data:

networks:
  code-ide-network:
    driver: bridge